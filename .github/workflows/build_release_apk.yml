name: Build Production APKs

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ "main" ] # Also build on push to main

jobs:
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Accept Android SDK Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create Release Keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          echo "storeFile=release.keystore" > android/key.properties
          echo "keyAlias=androiddebugkey" >> android/key.properties
          echo "storePassword=android" >> android/key.properties
          echo "keyPassword=android" >> android/key.properties

      - name: Build APK (Universal Release)
        run: flutter build apk --release

      - name: Build APK (Split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: production-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
