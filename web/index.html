<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Biztonic POS">

  <!-- Google Sign-In (Placeholder to prevent crash) -->
  <meta name="google-signin-client_id" content="placeholder-client-id.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="biztonic_pos">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Biztonic POS</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Force Agentation toolbar to render above Flutter canvas */
    #agentation-root,
    [data-agentation-root] {
      z-index: 2147483647 !important;
      position: relative;
    }
  </style>
</head>

<body>
  <!-- Agentation visual feedback and annotation toolbar -->
  <div id="agentation-root" style="position: relative; z-index: 2147483647;"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import ReactDOM from 'https://esm.sh/react-dom@18.3.1/client';
    import { Agentation } from 'https://esm.sh/agentation?deps=react@18.3.1,react-dom@18.3.1';

    try {
      const container = document.getElementById('agentation-root');
      const root = ReactDOM.createRoot(container);
      root.render(React.createElement(Agentation));
      console.log("Agentation toolbar loaded successfully.");
    } catch (e) {
      console.error("Failed to initialize Agentation toolbar:", e);
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
